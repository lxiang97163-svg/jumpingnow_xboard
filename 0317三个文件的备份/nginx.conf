# jumpingnow.com 强制 HTTPS
server {
    listen 80;
    server_name jumpingnow.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jumpingnow.com;
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate /etc/letsencrypt/live/jumpingnow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jumpingnow.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 禁止访问敏感文件
    location ~* ^/(\.env|\.git|compose\.yaml|Dockerfile|README\.md|\.env\.example|gen-certs\.sh|\.docker) {
        return 403;
        access_log off;
    }

    # 根路径：落地页
    location = / {
        root /usr/share/nginx/html/landing;
        try_files /index.html =404;
    }

    # 落地页静态资源
    location /landing/ {
        alias /usr/share/nginx/html/landing/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 主题 JS/CSS 不缓存，确保更新即时生效
    location ~* ^/theme/.*\.(js|css)$ {
        set $backend "web:7001";
        proxy_pass http://$backend;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # 其他静态资源长缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        set $backend "web:7001";
        proxy_pass http://$backend;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 主请求反代至 Xboard
    location / {
        set $backend "web:7001";
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Accept-Encoding "";
    }

    location @spa_fallback {
        set $backend "web:7001";
        proxy_pass http://$backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
    }
}
