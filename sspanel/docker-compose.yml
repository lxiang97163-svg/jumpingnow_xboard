services:
  db:
    image: mysql:8.4
    container_name: sspanel-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: sspanel_root_2024
      MYSQL_DATABASE: sspanel
      MYSQL_USER: sspanel
      MYSQL_PASSWORD: sspanel_pass_2024
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sspanel-net
  web:
    image: php:8.2-fpm-alpine
    container_name: sspanel-web
    restart: always
    volumes:
      - /opt/sspanel/app:/var/www/html
    working_dir: /var/www/html
    networks:
      - sspanel-net
    depends_on:
      - db
  nginx:
    image: nginx:alpine
    container_name: sspanel-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/sspanel/app:/var/www/html
      - /opt/sspanel/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - sspanel-net
    depends_on:
      - web
volumes:
  db_data:
networks:
  sspanel-net:
    driver: bridge
