services:
  db:
    image: mysql:8.0
    container_name: xboard-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: xboard_root_2024
      MYSQL_DATABASE: xboard
      MYSQL_USER: xboard
      MYSQL_PASSWORD: xboard_pass_2024
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pxboard_root_2024"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s
    networks:
      - xboard-net

  web:
    image: ghcr.io/cedar2025/xboard:new
    networks:
      - xboard-net
    volumes:
      - ./.docker/.data/redis/:/data/
      - ./.env:/www/.env
      - ./.docker/.data/:/www/.docker/.data
      - ./storage/logs:/www/storage/logs
      - ./storage/theme:/www/storage/theme
      - ./jumping-theme:/www/public/theme/jumping:ro
      - ./landing:/www/public/landing:ro
      - ./plugins:/www/plugins
    environment:
      - docker=true
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    command: php artisan octane:start --host=0.0.0.0 --port=7001
    restart: on-failure
    ports:
      - "7001:7001"

  horizon:
    image: ghcr.io/cedar2025/xboard:new
    networks:
      - xboard-net
    volumes:
      - ./.docker/.data/redis/:/data/
      - ./.env:/www/.env
      - ./.docker/.data/:/www/.docker/.data
      - ./storage/logs:/www/storage/logs
      - ./plugins:/www/plugins
    restart: on-failure
    command: php artisan horizon
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy

  ws-server:
    image: ghcr.io/cedar2025/xboard:new
    networks:
      - xboard-net
    volumes:
      - ./.docker/.data/redis/:/data/
      - ./.env:/www/.env
      - ./.docker/.data/:/www/.docker/.data
      - ./storage/logs:/www/storage/logs
      - ./plugins:/www/plugins
    command: php artisan ws-server start
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8076:8076"

  redis:
    image: redis:8-alpine
    command: redis-server --unixsocket /data/redis.sock --unixsocketperm 777 --save 900 1 --save 300 10 --save 60 10000
    restart: unless-stopped
    volumes:
      - ./.docker/.data/redis:/data
    networks:
      - xboard-net

  nginx:
    image: nginx:alpine
    container_name: xboard-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing:/usr/share/nginx/html/landing:ro
      - ./user-dashboard:/usr/share/nginx/html/user-dashboard:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - xboard-net

volumes:
  db_data:

networks:
  xboard-net:
    driver: bridge
