<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumping - 极速互联，超越极限</title>
    <style>
:root{--primary-color:#007aff;--accent-color:#5e5ce6;--bg-dark:#000;--text-main:#fff;--text-muted:#86868b;--tblr-font-sans-serif:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
body{font-family:var(--tblr-font-sans-serif);margin:0;padding:0;overflow-x:hidden;scroll-behavior:smooth}
.landing-page{background:#000;color:var(--text-main)}
.navbar-landing{position:fixed;top:0;width:100%;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;z-index:1000;background:transparent;box-sizing:border-box;transition:background .3s}
.navbar-landing.scrolled{background:rgba(0,0,0,.8);backdrop-filter:blur(20px)}
.logo{font-weight:800;font-size:24px;background:linear-gradient(90deg,#fff,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.nav-links{display:flex;gap:30px}
.nav-links a{color:var(--text-muted);text-decoration:none;font-size:14px;transition:color .3s}
.nav-links a:hover{color:#fff}
.btn-cta{background:rgba(255,255,255,.1);color:#fff;padding:8px 20px;border-radius:20px;font-weight:500;text-decoration:none;transition:all .2s;border:1px solid rgba(255,255,255,.1)}
.btn-cta:hover{background:#fff;color:#000}
.landing-container{display:flex;min-height:100vh;width:100%;padding:120px 60px 40px;box-sizing:border-box;align-items:center;justify-content:center;position:relative;z-index:2;gap:80px}
.content-left{flex:1.6;max-width:800px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;text-align:left}
.hero-title{font-size:64px;font-weight:700;letter-spacing:-2px;line-height:1.1;margin-bottom:20px;background:linear-gradient(135deg,#fff 0%,#a5a5a5 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:fadeRight 1s forwards .3s}
.hero-desc{font-size:18px;color:var(--text-muted);margin-bottom:30px;line-height:1.6;opacity:0;animation:fadeRight 1s forwards .5s}
.hero-actions{margin-bottom:30px;opacity:0;animation:fadeRight 1s forwards .7s}
.btn-primary,.btn-primary-landing{background:var(--primary-color);color:#fff!important;padding:14px 40px;border-radius:30px;font-size:16px;text-decoration:none;border:none;cursor:pointer;transition:all .3s ease;box-shadow:0 0 20px rgba(0,122,255,.4);display:inline-block}
.btn-primary:hover,.btn-primary-landing:hover{background:#0062cc;transform:translateY(-2px);box-shadow:0 0 30px rgba(0,122,255,.6)}
.download-widget{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:16px;padding:20px;width:100%;max-width:500px;opacity:0;animation:fadeRight 1s forwards .9s}
.dw-header{font-size:12px;text-transform:uppercase;color:var(--text-muted);margin-bottom:15px;letter-spacing:1px}
.dw-icons{display:flex;gap:15px}
.dw-btn{background:transparent;border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:20px}
.dw-btn:hover,.dw-btn.active{background:var(--primary-color);border-color:var(--primary-color)}
.dw-info{margin-top:15px;display:flex;align-items:center;justify-content:space-between;font-size:14px}
.dw-link{color:var(--primary-color);text-decoration:none;font-weight:500;display:flex;align-items:center;gap:5px}
.content-right{flex:.8;max-width:350px;display:flex;justify-content:center;align-items:center;opacity:0;animation:fadeLeft 1s forwards .5s}
.feature-grid-compact{display:grid;grid-template-columns:1fr;gap:15px;width:100%}
.feature-card-mini{background:rgba(28,28,30,.4);border:1px solid rgba(255,255,255,.05);backdrop-filter:blur(10px);padding:20px;border-radius:16px;transition:transform .3s,background .3s;display:flex;align-items:center;gap:15px;text-align:left}
.feature-card-mini:hover{background:rgba(40,40,45,.6);transform:translateX(-5px);border-color:rgba(255,255,255,.1)}
.fc-icon{font-size:24px;color:var(--primary-color);flex-shrink:0;width:40px;height:40px;background:rgba(0,122,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center}
.fc-content{flex:1}
.fc-title{font-size:15px;font-weight:600;margin-bottom:4px;color:#fff}
.fc-desc{font-size:12px;color:var(--text-muted);line-height:1.3;margin:0}
#particles-js{position:absolute;width:100%;height:100%;top:0;left:0;z-index:1;pointer-events:none}
.cursor-blob{position:fixed;width:400px;height:400px;background:radial-gradient(circle,rgba(0,122,255,.15) 0%,rgba(0,0,0,0) 70%);border-radius:50%;pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:transform .1s ease}
@keyframes fadeRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@media(max-width:992px){.landing-container{flex-direction:column;height:auto;padding-top:100px;text-align:center}.content-left{align-items:center;text-align:center;margin-bottom:40px}.landing-page{overflow-y:auto}.navbar-landing{padding:15px 20px}.nav-links{display:none}}
    </style>
    <link rel="stylesheet" href="/landing/assets/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="landing-page">

    <div class="cursor-blob" id="cursorBlob"></div>
    <canvas id="particles-js"></canvas>

    <nav class="navbar-landing">
        <div class="logo">Jumping.</div>
        <div class="nav-links">
            <a href="/plan">订阅套餐</a>
            <a href="/server">节点列表</a>
            <a href="/plan">使用教程</a>
        </div>
        <a href="/user" class="btn-cta">用户中心</a>
    </nav>

    <div class="landing-container">
        <!-- Left Content: Hero & Actions -->
        <div class="content-left">
            <h1 class="hero-title">速度，<br>超越极限。</h1>
            <p class="hero-desc">
                体验未来的连接方式。IEPL 专线直连，4K 秒开，绝对隐私保护。<br>
                全球 80+ 节点，解锁 Netflix, Disney+, ChatGPT。
            </p>
            <div class="hero-actions">
                <a href="/plan" class="btn-primary">立即开始订阅</a>
            </div>

            <!-- Compact Download Widget -->
            <div class="download-widget">
                <div class="dw-header">客户端下载 & 教程</div>
                <div class="dw-icons">
                    <button class="dw-btn active" onclick="selectClient('win')" title="Windows"><i class="ph ph-windows-logo"></i></button>
                    <button class="dw-btn" onclick="selectClient('mac')" title="macOS"><i class="ph ph-apple-logo"></i></button>
                    <button class="dw-btn" onclick="selectClient('android')" title="Android"><i class="ph ph-android-logo"></i></button>
                    <button class="dw-btn" onclick="selectClient('ios')" title="iOS"><i class="ph ph-app-store-logo"></i></button>
                </div>
                <div class="dw-info">
                    <span id="client-name">Clash Verge Rev</span>
                    <a href="/plan" class="dw-link">点击下载 <i class="ph ph-arrow-right"></i></a>
                </div>
            </div>
        </div>

        <!-- Right Content: Features Grid -->
        <div class="content-right">
            <div class="feature-grid-compact">
                <div class="feature-card-mini">
                    <div class="fc-icon"><i class="ph ph-rocket-launch"></i></div>
                    <div class="fc-content">
                        <div class="fc-title">极速体验</div>
                        <div class="fc-desc">IEPL 内网专线，低延迟游戏，4K 视频秒开。</div>
                    </div>
                </div>
                <div class="feature-card-mini">
                    <div class="fc-icon"><i class="ph ph-shield-check"></i></div>
                    <div class="fc-content">
                        <div class="fc-title">隐私安全</div>
                        <div class="fc-desc">零日志记录，军用级 AES-256 加密传输。</div>
                    </div>
                </div>
                <div class="feature-card-mini">
                    <div class="fc-icon"><i class="ph ph-globe-hemisphere-west"></i></div>
                    <div class="fc-content">
                        <div class="fc-title">全球解锁</div>
                        <div class="fc-desc">解锁 Netflix, Disney+, HBO, ChatGPT 等服务。</div>
                    </div>
                </div>
                <div class="feature-card-mini">
                    <div class="fc-icon"><i class="ph ph-devices"></i></div>
                    <div class="fc-content">
                        <div class="fc-title">全平台支持</div>
                        <div class="fc-desc">iOS, Android, Windows, macOS 完美兼容。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Client Selection Logic
        const clients = {
            'win': 'Clash Verge Rev',
            'mac': 'ClashX Pro',
            'android': 'Clash for Android',
            'ios': 'Shadowrocket'
        };

        function selectClient(os) {
            document.querySelectorAll('.dw-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('client-name').textContent = clients[os];
        }

        // Particle Effect
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        for(let i=0; i<40; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: Math.random() * 2
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Mouse Blob
        const blob = document.getElementById('cursorBlob');
        document.addEventListener('mousemove', (e) => {
            blob.style.left = e.clientX + 'px';
            blob.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
