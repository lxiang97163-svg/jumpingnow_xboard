# 本地测试：http://localhost 或 http://127.0.0.1（无 SSL）
server {
    listen 80;
    server_name localhost 127.0.0.1;

    location = / {
        alias /usr/share/nginx/html/landing/;
        index index.html;
    }
    location /landing/ {
        alias /usr/share/nginx/html/landing/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location / {
        proxy_pass http://web:7001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# 正式环境：jumpingnow.com 强制 HTTPS
server {
    listen 80;
    server_name jumpingnow.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jumpingnow.com;

    ssl_certificate /etc/letsencrypt/live/jumpingnow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jumpingnow.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 根路径：Jumping 落地页
    location = / {
        alias /usr/share/nginx/html/landing/;
        index index.html;
    }

    # 落地页静态资源（避免与 Xboard /assets/ 冲突）
    location /landing/ {
        alias /usr/share/nginx/html/landing/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 其余请求反代至 Xboard
    location / {
        proxy_pass http://web:7001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://web:7001;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
