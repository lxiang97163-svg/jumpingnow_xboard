# 本地测试：http://localhost 或 http://127.0.0.1（无 SSL）
server {
    listen 80;
    server_name localhost 127.0.0.1;

    # 禁止访问敏感文件，防止 F12/探测时泄露
    location ~* \.(env|git|sql|yaml|yml|md|sh|example)$ { return 403; }
    location ~* (compose|Dockerfile|Dockerfile\.\w+)$ { return 403; }
    location ~ ^/(\.env|\.git|README) { return 403; }

    location = / {
        root /usr/share/nginx/html/landing;
        try_files /index.html =404;
    }
    location /landing/ {
        alias /usr/share/nginx/html/landing/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location / {
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
        set $backend "web:7001";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<script src="/theme/jumping/theme-default.js?v=20260316i"></script></head>';
        sub_filter '</body>' '<link rel="stylesheet" href="/theme/jumping/jumping.css?v=20260316i"><script src="/theme/jumping/theme-sync.js?v=20260316i"></script><script src="/theme/jumping/theme-dashboard-modules.js?v=20260316i"></script></body>';
        sub_filter_once off;
    }
    location @spa_fallback {
        set $backend "web:7001";
        proxy_pass http://$backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 正式环境：jumpingnow.com 强制 HTTPS
server {
    listen 80;
    server_name jumpingnow.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jumpingnow.com;
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate /etc/letsencrypt/live/jumpingnow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jumpingnow.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 防护：禁止访问敏感文件（即使用户 F12 尝试直接请求）
    location ~* ^/(\.env|\.git|compose\.yaml|Dockerfile|README\.md|\.env\.example|gen-certs\.sh|\.docker) {
        return 403;
        access_log off;
    }

    # 根路径：Jumping 落地页（try_files 避免内部重定向到代理）
    location = / {
        root /usr/share/nginx/html/landing;
        try_files /index.html =404;
    }

    # 落地页静态资源（避免与 Xboard /assets/ 冲突）
    location /landing/ {
        alias /usr/share/nginx/html/landing/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 用户仪表盘（摘要卡片、订阅、公告、流量统计）
    # Jumping 主题 CSS：短缓存便于样式更新即时生效
    location = /theme/jumping/jumping.css {
        set $backend "web:7001";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 其余请求反代至 Xboard（404 时回退到 SPA 入口，支持 /plan /user 等前端路由）
    # 注入 Jumping 主题 CSS 以保持精美样式
    location / {
        set $backend "web:7001";
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<script src="/theme/jumping/theme-default.js?v=20260316i"></script></head>';
        sub_filter '</HEAD>' '<script src="/theme/jumping/theme-default.js?v=20260316i"></script></HEAD>';
        sub_filter '</body>' '<link rel="stylesheet" href="/theme/jumping/jumping.css?v=20260316i"><script src="/theme/jumping/theme-sync.js?v=20260316i"></script><script src="/theme/jumping/theme-dashboard-modules.js?v=20260316i"></script></body>';
        sub_filter '</BODY>' '<link rel="stylesheet" href="/theme/jumping/jumping.css?v=20260316i"><script src="/theme/jumping/theme-sync.js?v=20260316i"></script><script src="/theme/jumping/theme-dashboard-modules.js?v=20260316i"></script></BODY>';
        sub_filter_once off;
    }

    location @spa_fallback {
        set $backend "web:7001";
        proxy_pass http://$backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '<script src="/theme/jumping/theme-default.js?v=20260316i"></script></head>';
        sub_filter '</HEAD>' '<script src="/theme/jumping/theme-default.js?v=20260316i"></script></HEAD>';
        sub_filter '</body>' '<link rel="stylesheet" href="/theme/jumping/jumping.css?v=20260316i"><script src="/theme/jumping/theme-sync.js?v=20260316i"></script><script src="/theme/jumping/theme-dashboard-modules.js?v=20260316i"></script></body>';
        sub_filter '</BODY>' '<link rel="stylesheet" href="/theme/jumping/jumping.css?v=20260316i"><script src="/theme/jumping/theme-sync.js?v=20260316i"></script><script src="/theme/jumping/theme-dashboard-modules.js?v=20260316i"></script></BODY>';
        sub_filter_once off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        set $backend "web:7001";
        proxy_pass http://$backend;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
